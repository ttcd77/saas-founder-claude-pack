<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're on the list — Claude Code Skill Pack</title>
<meta name="robots" content="noindex">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0b;
    --surface: #141416;
    --border: #27272a;
    --text: #e4e4e7;
    --text-muted: #a1a1aa;
    --accent: #22c55e;
    --accent-glow: rgba(34,197,94,0.15);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 48px 40px;
    text-align: center;
    max-width: 480px;
    margin: 24px;
  }
  .check {
    font-size: 48px;
    margin-bottom: 16px;
  }
  h1 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 10px;
    letter-spacing: -0.01em;
  }
  p {
    color: var(--text-muted);
    font-size: 15px;
    margin-bottom: 24px;
  }
  .timeline {
    background: rgba(34,197,94,0.08);
    border: 1px solid var(--accent-glow);
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 14px;
    color: var(--accent);
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .back-link {
    display: inline-block;
    color: var(--text-muted);
    font-size: 13px;
    text-decoration: none;
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 6px;
    transition: border-color 0.2s;
  }
  .back-link:hover { border-color: var(--text-muted); }
</style>
</head>
<body>
<div class="card">
  <div class="check">&#10003;</div>
  <h1>You're on the list</h1>
  <p>We'll email you as soon as the Claude Code Skill Pack is ready for purchase. One email. No spam.</p>
  <div class="timeline">
    Expected launch: this week. You'll be the first to know when the buy button goes live.
  </div>
  <a href="./" class="back-link">&larr; Back to the page</a>
</div>
</body>
</html>
