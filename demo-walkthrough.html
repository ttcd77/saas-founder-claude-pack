<style>
/* ===== Demo Walkthrough Styles ===== */

.demo-section {
  padding: 64px 0;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}

.demo-container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 0 24px;
}

.demo-header {
  text-align: center;
  margin-bottom: 40px;
}

.demo-header h2 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--text);
  margin-bottom: 10px;
}

.demo-header .demo-subtitle {
  font-size: 15px;
  color: var(--text-muted);
  max-width: 500px;
  margin: 0 auto;
}

/* Grid: terminal left, annotation right */
.demo-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.15fr) minmax(0, 0.85fr);
  gap: 32px;
  align-items: start;
  margin-bottom: 28px;
}

/* ===== Terminal Window ===== */
.demo-terminal-wrapper {
  background: #0d0d10;
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: box-shadow 0.35s ease;
  position: relative;
}

.demo-terminal-wrapper:hover {
  box-shadow: 0 0 36px rgba(34,197,94,0.06), 0 0 72px rgba(34,197,94,0.03);
}

/* macOS window chrome */
.demo-terminal-chrome {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  background: #1a1a1f;
  border-bottom: 1px solid var(--border);
  user-select: none;
}

.demo-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}

.demo-dot-red    { background: #ff5f56; }
.demo-dot-yellow { background: #ffbd2e; }
.demo-dot-green  { background: #27ca40; }

.demo-chrome-title {
  flex: 1;
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  letter-spacing: 0.02em;
}

/* Terminal body */
.demo-terminal-body {
  padding: 16px 18px;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', 'Monaco', monospace;
  font-size: 13px;
  line-height: 1.65;
  color: var(--text);
  min-height: 360px;
  position: relative;
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-word;
}

/* Terminal color classes */
.t-green  { color: #4ade80; }
.t-yellow { color: var(--code); }
.t-cyan   { color: #67e8f9; }
.t-dim    { color: #71717a; }
.t-white  { color: #e4e4e7; }
.t-red    { color: #ef4444; }
.t-bold   { font-weight: 700; }

/* Cursor */
.demo-cursor {
  display: inline-block;
  width: 8px;
  height: 15px;
  background: #22c55e;
  vertical-align: text-bottom;
  margin-left: 1px;
  animation: demo-blink 0.9s step-end infinite;
}

@keyframes demo-blink {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0; }
}

/* Step 7 glow pulse */
.demo-terminal-wrapper.demo-step-glow {
  box-shadow: 0 0 40px rgba(34,197,94,0.10), 0 0 80px rgba(34,197,94,0.05);
  transition: box-shadow 0.5s ease;
}

/* ===== Right Annotation Panel ===== */
.demo-annotation {
  padding-top: 6px;
}

.demo-step-badge {
  display: inline-block;
  background: var(--accent-glow);
  color: var(--accent);
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 100px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.demo-step-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
  letter-spacing: -0.01em;
  transition: color 0.3s;
}

.demo-step-desc {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.65;
  transition: color 0.3s;
}

/* ===== Navigation ===== */
.demo-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.demo-nav-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 13px;
  font-weight: 600;
  padding: 8px 16px;
  border-radius: 8px;

  font-family: inherit;
  user-select: none;
}

.demo-nav-btn:hover:not(:disabled) {
  border-color: var(--accent);
  background: var(--accent-glow);
}

.demo-nav-btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

.demo-nav-btn .demo-nav-arrow {
  font-size: 16px;
  line-height: 1;
}

/* Dots */
.demo-dots {
  display: flex;
  gap: 8px;
  align-items: center;
}

.demo-dot-nav {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--border);
  cursor: pointer;
  transition: all 0.25s;
  border: none;
  padding: 0;
  flex-shrink: 0;
}

.demo-dot-nav:hover {
  background: var(--text-muted);
}

.demo-dot-nav.demo-active {
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent-glow);
  width: 28px;
  border-radius: 5px;
}

/* Auto-play toggle */
.demo-autoplay {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-muted);
  cursor: pointer;
  user-select: none;
}

.demo-autoplay input {
  display: none;
}

.demo-toggle-track {
  width: 36px;
  height: 20px;
  border-radius: 10px;
  background: var(--border);
  position: relative;
  transition: background 0.25s;
  flex-shrink: 0;
}

.demo-toggle-track::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: all 0.25s;
}

.demo-autoplay input:checked + .demo-toggle-track {
  background: var(--accent-glow);
}

.demo-autoplay input:checked + .demo-toggle-track::after {
  background: var(--accent);
  left: 18px;
}

.demo-autoplay-label {
  font-size: 12px;
  color: var(--text-muted);
  transition: color 0.25s;
}

.demo-autoplay input:checked ~ .demo-autoplay-label {
  color: var(--accent);
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .demo-grid {
    grid-template-columns: 1fr;

  }

  }

  .demo-nav-btn {
    padding: 6px 12px;
    font-size: 12px;
  }

  .demo-step-title {
    font-size: 18px;
  }
}

  /* ===== Parse HTML into typed segments ===== */
  function parseSegments(html) {
    var segs = [];
    var i = 0;
    var text = '';
    while (i < html.length) {
      if (html[i] === '<') {
        if (text) { segs.push({ t: 'text', v: text }); text = ''; }
        var tag = '<';
        i++;
        while (i < html.length && html[i] !== '>') { tag += html[i]; i++; }
        tag += '>';
        segs.push({ t: 'tag', v: tag });
        i++;
      } else {
        text += html[i];
        i++;
      }
    }
    if (text) { segs.push({ t: 'text', v: text }); }
    return segs;
  }

    bodyEl.innerHTML = steps[idx].terminal + '<span class="demo-cursor"></span>';
  }

  /* ===== Typewriter reveal ===== */
  function typeContent(idx, callback) {
    cancelTyping();
    isTyping = true;

    var html    = steps[idx].terminal;
    var segs    = parseSegments(html);
    var segIdx  = 0;
    var charIdx = 0;
    var accumulated = '';

    function tick() {
      if (!isTyping) return;

      if (segIdx >= segs.length) {
        // Done typing — append cursor
        bodyEl.innerHTML = accumulated + '<span class="demo-cursor"></span>';
        isTyping = false;
        typeTimer = null;
        if (callback) callback();
        return;
      }

      var seg = segs[segIdx];

      if (seg.t === 'tag') {
        accumulated += seg.v;
        segIdx++;
        charIdx = 0;
        bodyEl.innerHTML = accumulated + '<span class="demo-cursor"></span>';
        typeTimer = setTimeout(tick, typeSpeedMs * 3);
      } else {
        // Text segment: reveal 3 chars per tick
        var charsToTake = Math.min(3, seg.v.length - charIdx);
        accumulated += seg.v.substring(charIdx, charIdx + charsToTake);
        charIdx += charsToTake;
        bodyEl.innerHTML = accumulated + '<span class="demo-cursor"></span>';

        if (charIdx >= seg.v.length) {
          segIdx++;
          charIdx = 0;
        }
        typeTimer = setTimeout(tick, typeSpeedMs * charsToTake);
      }
    }

    tick();
  }

  /* ===== Go to a specific step ===== */
  function goToStep(idx) {
    if (idx < 0 || idx >= steps.length) return;
    if (idx === currentStep && !isTyping) return; // already there

    currentStep = idx;

    // Stop auto-play when user manually navigates
    if (autoChk.checked && !isTyping) {
      autoChk.checked = false;
      stopAutoPlay();
    }

    cancelTyping();
    updateAnnotation(idx);
    updateDots(idx);
    updateButtons(idx);
    updateGlow(idx);

    // Show instantly first, then type
    showInstant(idx);

    // Small delay so user sees the full content briefly before restart
    typeTimer = setTimeout(function() {
      bodyEl.innerHTML = '';
      typeContent(idx);
    }, 400);
  }

  /* ===== Next / Prev ===== */
  function goNext() {
    if (currentStep < steps.length - 1) {
      goToStep(currentStep + 1);
    }
  }

  function goPrev() {
    if (currentStep > 0) {
      goToStep(currentStep - 1);
    }
  }

  /* ===== Auto-play ===== */
  function startAutoPlay() {
    stopAutoPlay();
    autoTimer = setInterval(function() {
      if (currentStep >= steps.length - 1) {
        // Reached the end — stop auto-play
        autoChk.checked = false;
        stopAutoPlay();
        return;
      }
      goNext();
    }, 3200);
  }

  function stopAutoPlay() {
    if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
  }

  /* ===== Event listeners ===== */
  prevBtn.addEventListener('click', goPrev);
  nextBtn.addEventListener('click', goNext);

  autoChk.addEventListener('change', function() {
    if (autoChk.checked) {
      startAutoPlay();
      // If at the last step, loop back to start
      if (currentStep >= steps.length - 1) {
        goToStep(0);
      }
    } else {
      stopAutoPlay();
    }
  });

  /* ===== Keyboard navigation ===== */
  document.addEventListener('keydown', function(e) {
    // Only respond when demo section is visible (simple check)
    var demoSection = document.getElementById('demo');
    if (!demoSection) return;
    var rect = demoSection.getBoundingClientRect();
    var inView = rect.top < window.innerHeight && rect.bottom > 0;
    if (!inView) return;

    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      e.preventDefault();
      goNext();
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      e.preventDefault();
      goPrev();
    } else if (e.key === ' ') {
      e.preventDefault();
      autoChk.checked = !autoChk.checked;
      autoChk.dispatchEvent(new Event('change'));
    }
  });

  /* ===== Initialize ===== */
  buildDots();
  updateAnnotation(0);
  updateDots(0);
  updateButtons(0);
  updateGlow(0);

  // Start typing step 0 after a short delay (page load wait)
  setTimeout(function() {
    typeContent(0);
  }, 300);

})();
</script>
